<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; }
body {
    background: #000000;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
}
marquee {
    color: #00aaff;
    font-size: 64px;
    font-family: monospace;
    font-weight: bold;
    text-shadow: 0 0 10px #00aaff, 0 0 30px #00aaff, 0 0 60px #0055ff;
    white-space: nowrap;
}
</style>
</head>
<body>
<marquee scrollamount="6" id="ticker">RADIO WALLPLATE</marquee>
<script>
var search = window.location.search;
var text = "RADIO WALLPLATE";
if (search.length > 0) {
    var pairs = search.substring(1).split("&");
    var i;
    for (i = 0; i < pairs.length; i++) {
        var pair = pairs[i].split("=");
        if (pair[0] === "t" && pair.length > 1) {
            text = decodeURIComponent(pair[1].replace(/\+/g, " "));
        }
    }
}
document.getElementById("ticker").innerHTML = text;
</script>
</body>
</html>
