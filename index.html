<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    height: 100vh;
    display: flex;
    align-items: center;
    overflow: hidden;
  }
  .ticker {
    white-space: nowrap;
    color: #00aaff;
    font: bold 64px monospace;
    text-shadow:
      0 0 10px #00aaff,
      0 0 30px #00aaff,
      0 0 60px #0055ff;
    animation: scroll 12s linear infinite;
    padding-left: 100%;
  }
  @keyframes scroll {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-100%); }
  }
</style>
</head>
<body>
<div class="ticker" id="t">RADIO WALLPLATE</div>
<script>
  var p = new URLSearchParams(window.location.search);
  var t = p.get('t');
  if (t) document.getElementById('t').innerText = t;
</script>
</body>
</html>
